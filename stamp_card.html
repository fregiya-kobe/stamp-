<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREGIYA STAMP CARD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 200px; display: flex; align-items: center; justify-content: center; }
        .brand-logo { width: 100%; height: auto; display: block; margin: 0 auto; }
        .card-container { width: 100%; max-width: 350px; background: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 25px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .status-text { font-size: 0.9rem; text-align: center; color: #444444; margin-bottom: 20px; line-height: 1.6; }
        .status-text strong { color: #000000; font-size: 1.2rem; border-bottom: 2px solid #000000; padding-bottom: 2px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 25px; }
        .slot { aspect-ratio: 1; background: #f9f9f9; border: 1px solid #dddddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: #aaaaaa; position: relative; }
        .slot.reward-2 { border-color: #bbbbbb; color: #888888; }
        .slot.reward-5 { border-color: #000000; color: #000000; }
        .slot.reward-2::after { content: '¥'; position: absolute; font-size: 0.55rem; bottom: 2px; }
        .slot.reward-5::after { content: '★'; position: absolute; font-size: 0.55rem; bottom: 2px; }
        .slot.stamped { background: #000000; border-color: #000000; }
        .slot.stamped::after { display: none; }
        .stamp-svg { width: 70%; height: 70%; }
        .rewards-section { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .coupon-badge { background: #000000; color: #ffffff; padding: 14px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 0.85rem; cursor: pointer; border: 1px solid #000000; animation: pulse-dark 2s infinite; }
        .novelty-badge { background: #ffffff; color: #000000; border: 2px solid #000000; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        @keyframes pulse-dark { 0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.2); } 70% { box-shadow: 0 0 0 8px rgba(0,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
        .info-footer { text-align: center; font-size: 0.7rem; color: #888888; line-height: 1.6; margin-top: 30px; letter-spacing: 0.05em; }
        .msg { color: #ff3b30; font-size: 0.75rem; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//9k=" alt="FREGIYA ロゴ" class="brand-logo">
    </div>
    <div class="card-container">
        <div class="status-text" id="statusText">Loading...</div>
        <div class="grid" id="stampGrid"></div>
        <div class="rewards-section" id="rewardsSection"></div>
        <div class="msg" id="errorMsg"></div>
    </div>
    <div class="info-footer">
        2回ごと: ¥100 OFF / 5の倍数: SPECIAL NOVELTY<br>
        1 NIGHT = 1 STAMP (1日1回限定)<br>
        1,500+ STOCK / VINTAGE & ARCHIVE
    </div>

<script>
    const STAMP_SVG = '<svg class="stamp-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="44" fill="none" stroke="#ffffff" stroke-width="4"/><circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-width="1.5"/><text x="50" y="72" font-family="Times New Roman, serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">F</text></svg>';

    let state = JSON.parse(localStorage.getItem('frgy_stamp_state')) || {
        totalStamps: 0,
        usedDiscountCount: 0,
        usedNoveltyCount: 0
    };
    const MAX_STAMPS = 20;

    function saveState() {
        localStorage.setItem('frgy_stamp_state', JSON.stringify(state));
    }

    function getTodayCode() {
        const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
        const secret = 'FRGY';
        let hash = 0;
        for (let i = 0; i < (today + secret).length; i++) {
            hash = ((hash << 5) - hash) + (today + secret).charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash).toString(36).toUpperCase().slice(0, 6);
    }

    function checkScan() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (!code) return;

        window.history.replaceState({}, document.title, window.location.pathname);

        if (code !== getTodayCode()) {
            document.getElementById('errorMsg').innerText = "このQRコードは無効または期限切れです。";
            return;
        }

        const today = new Date().toISOString().slice(0, 10);
        const lastScanDate = localStorage.getItem('frgy_last_scan_date');
        if (lastScanDate === today) {
            document.getElementById('errorMsg').innerText = "本日のスタンプは既に取得済みです。";
            return;
        }

        if (state.totalStamps >= MAX_STAMPS) {
            state.totalStamps = 1;
            state.usedDiscountCount = 0;
            state.usedNoveltyCount = 0;
        } else {
            state.totalStamps++;
        }

        localStorage.setItem('frgy_last_scan_date', today);
        saveState();
        document.getElementById('errorMsg').style.color = '#00aa00';
        document.getElementById('errorMsg').innerText = "スタンプを獲得しました！";
    }

    function renderCard() {
        const s = state.totalStamps;
        const grid = document.getElementById('stampGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= MAX_STAMPS; i++) {
            const slot = document.createElement('div');
            slot.classList.add('slot');
            if (i % 5 === 0) slot.classList.add('reward-5');
            else if (i % 2 === 0) slot.classList.add('reward-2');
            if (i <= s) { slot.classList.add('stamped'); slot.innerHTML = STAMP_SVG; }
            else slot.innerText = i;
            grid.appendChild(slot);
        }

        const availableDiscounts = Math.floor(s / 2);
        const availableNovelties = Math.floor(s / 5);
        const hasDiscount = availableDiscounts > state.usedDiscountCount;
        const hasNovelty  = availableNovelties > state.usedNoveltyCount;

        const mod2 = s % 2;
        const mod5 = s % 5;
        const next2text = hasDiscount ? '' : '¥100オフまであと ' + (2 - mod2) + '回';
        const next5text = hasNovelty  ? '' : 'グッズまであと ' + (5 - mod5) + '回';
        const nextParts = [next2text, next5text].filter(Boolean);

        document.getElementById('statusText').innerHTML =
            '現在のスタンプ: <strong>' + s + '</strong> 個' +
            (nextParts.length ? '<br><span style="font-size:0.75rem; color:#666666; margin-top:8px; display:inline-block;">' + nextParts.join(' / ') + '</span>' : '');

        const rewardsSection = document.getElementById('rewardsSection');
        rewardsSection.innerHTML = '';

        if (hasDiscount) {
            const btn = document.createElement('div');
            btn.classList.add('coupon-badge');
            btn.innerText = '【スタッフ確認】¥100 OFFを使用する';
            btn.onclick = () => {
                if (confirm('100円オフを適用しますか？（スタッフが操作してください）')) {
                    state.usedDiscountCount++;
                    saveState();
                    renderCard();
                }
            };
            rewardsSection.appendChild(btn);
        }

        if (hasNovelty) {
            const btn = document.createElement('div');
            btn.classList.add('novelty-badge');
            btn.innerText = '【スタッフ確認】限定ノベルティと交換';
            btn.onclick = () => {
                if (confirm('ノベルティと交換しますか？（スタッフが操作してください）')) {
                    state.usedNoveltyCount++;
                    saveState();
                    renderCard();
                }
            };
            rewardsSection.appendChild(btn);
        }
    }

    checkScan();
    renderCard();
</script>
